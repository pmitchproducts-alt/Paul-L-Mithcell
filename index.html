<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Defensive safety patch for sandboxed/iframe environments where window.fetch has only a getter
      (function() {
        try {
          const win = window;
          const desc = Object.getOwnPropertyDescriptor(win, 'fetch') || Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
          if (desc && !desc.set) {
            let currentFetch = win.fetch;
            Object.defineProperty(win, 'fetch', {
              get() {
                return currentFetch;
              },
              set(v) {
                currentFetch = v;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Could not patch window.fetch setter:", e);
        }
      })();
    </script>
    <title>SmartBag</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                blue: '#2563EB',
                lightBlue: '#3B82F6',
                orange: '#F97316',
                lightOrange: '#FB923C',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F3F4F6;
        font-family: 'Inter', sans-serif;
      }
      /* Hide scrollbar for cleaner mobile look */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Custom keyframes for premium route transitions */
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-slide-up {
        animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-pop-in {
        animation: popIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
  </head>
  <body class="bg-slate-100 flex items-center justify-center min-h-screen p-0 md:p-4 select-none">
    
    <!-- Phone Mockup Wrapper -->
    <div class="w-full max-w-md h-screen md:h-[860px] bg-[#F8F9FB] md:rounded-[48px] md:shadow-2xl md:border-[10px] md:border-slate-950 overflow-hidden relative flex flex-col">
       
       <!-- Simulated Phone Notch/Dynamic Island for Desktop -->
       <div class="hidden md:flex absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-950 rounded-b-2xl z-50 items-center justify-center">
          <div class="w-3 h-3 bg-slate-900 rounded-full mr-2"></div>
          <div class="w-1.5 h-1.5 bg-slate-900 rounded-full"></div>
       </div>

       <!-- Mobile Header Status Bar (Simulated) -->
       <div class="w-full h-11 bg-transparent px-6 flex justify-between items-center text-xs font-bold text-slate-800 z-50 shrink-0 select-none pointer-events-none md:pt-1">
          <span id="statusBarTime">12:30</span>
          <div class="flex items-center gap-1.5">
             <!-- Signal strength -->
             <svg class="w-4 h-4 fill-slate-800" viewBox="0 0 24 24">
                <path d="M2 22h20V2z" />
             </svg>
             <!-- Wifi -->
             <svg class="w-4 h-4 fill-slate-800" viewBox="0 0 24 24">
                <path d="M12 21l-12-12c5.5-5.5 14.5-5.5 20 0z" />
             </svg>
             <!-- Battery -->
             <div class="w-5 h-2.5 border border-slate-800 rounded-sm p-0.5 flex items-center">
                <div class="h-full w-3.5 bg-slate-800 rounded-[1px]"></div>
                <div class="w-0.5 h-1 bg-slate-800 rounded-r-sm -mr-1"></div>
             </div>
          </div>
       </div>

       <!-- Main Application Mounting Point (Scrollable Inside Frame) -->
       <div id="root" class="flex-1 overflow-y-auto no-scrollbar flex flex-col relative">
          <!-- Vanilla components will mount here dynamically -->
       </div>

    </div>

    <!-- Global App Mounting and Router -->
    <script type="module" src="/index.js"></script>

    <script>
      // Keep simulated time updated
      function updateTime() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        const timeEl = document.getElementById('statusBarTime');
        if (timeEl) timeEl.textContent = timeStr;
      }
      updateTime();
      setInterval(updateTime, 10000);
    </script>
  </body>
</html>
